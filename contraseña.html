<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>verificaciones</title>
  </head>
  <body>
    <select name="" id="pass1">
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="7">7</option>
      <option value="8">8</option>
      <option value="9">9</option>
      <option value="0">0</option>
    </select>

    <select name="" id="pass2">
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="7">7</option>
      <option value="8">8</option>
      <option value="9">9</option>
      <option value="0">0</option>
    </select>
    <select name="" id="pass3">
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="7">7</option>
      <option value="8">8</option>
      <option value="9">9</option>
      <option value="0">0</option>
    </select>

    <button
      onclick="
        let num1 = document.querySelector('#pass1').value;
        let num2 = document.querySelector('#pass2').value;
        let num3 = document.querySelector('#pass3').value;
        let password = num1 + num2 + num3;
        let result = document.querySelector('#result');
        if (password === '911') {
          result.textContent = 'Password 1 correcto';
        } else if (password === '714') {
          result.textContent = 'Password 2 correcto';
        } else {
          result.textContent = 'Password incorrecto';
        }
      "
    >
      verificar
    </button>

    <p id="result"></p>

    <a href="./index.html">imagen con borde</a>
    <a href="./stickers.html">Ejercicios sticker</a>
  </body>
</html>
